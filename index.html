<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Home Finder - Hult International Business School</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; background: #F5F0E8; color: #1B2A4A; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  .loader { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#1B2A4A; color:white; }
  .loader h2 { font-size:20px; margin-bottom:8px; } .loader p { opacity:0.5; font-size:14px; }
  .spin { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="loader"><div class="spin"></div><h2>Dubai Home Finder</h2><p>Loading accommodation data...</p></div></div>

<script>
// JSONP loader - bypasses CORS for local files and Safari
var SHEET_ID = "10pW1sKQA-_gPfRQX9xHPvqtmm5kCoRDTyGBoRaPz-Rw";
var _sheetData = { props: null, rooms: null };

function gvizToRows(response) {
  var cols = response.table.cols.map(function(c) { return c.label; });
  return response.table.rows.map(function(row) {
    var obj = {};
    row.c.forEach(function(cell, i) {
      obj[cols[i]] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : "") : "";
    });
    return obj;
  });
}

function handleProps(response) {
  _sheetData.props = gvizToRows(response);
  checkReady();
}

function handleRooms(response) {
  _sheetData.rooms = gvizToRows(response);
  checkReady();
}

function checkReady() {
  if (_sheetData.props && _sheetData.rooms) {
    window._rawSheetData = _sheetData;
    var evt = new Event('sheetDataReady');
    window.dispatchEvent(evt);
  }
}

function loadSheet(gid, callback) {
  var s = document.createElement('script');
  s.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=responseHandler:" + callback + "&gid=" + gid;
  s.onerror = function() {
    window._sheetLoadError = true;
    var evt = new Event('sheetDataReady');
    window.dispatchEvent(evt);
  };
  document.head.appendChild(s);
}

loadSheet(0, "handleProps");
loadSheet(39750963, "handleRooms");

// Timeout fallback
setTimeout(function() {
  if (!_sheetData.props || !_sheetData.rooms) {
    window._sheetLoadError = true;
    var evt = new Event('sheetDataReady');
    window.dispatchEvent(evt);
  }
}, 10000);
</script>

<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  navy: "#1B2A4A", blue: "#2563EB", cream: "#F5F0E8", white: "#FFFFFF",
  gray: "#64748B", lightGray: "#E2E8F0", green: "#166534", greenBg: "#F0FDF4",
  teal: "#0E7490", amber: "#92400E", amberBg: "#FFFBEB", amberBorder: "#F59E0B",
  tagBg: "#EEF2FF",
};

const typeLabels = { student_residence: "Student Residence", hotel: "Hotel / Hotel Apartment" };
const typeColors = { student_residence: "#6B2D8B", hotel: "#1B2A4A" };

function parseNum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function parseBool(v) { return String(v).toUpperCase() === "TRUE"; }
function parseStr(v) { return (v || "").trim(); }

function buildData(propsRows, roomsRows) {
  const roomsByProp = {};
  roomsRows.forEach(r => {
    const pid = parseStr(r.propertyId);
    if (!pid) return;
    if (!roomsByProp[pid]) roomsByProp[pid] = [];
    const room = {
      type: parseStr(r.roomType),
      privacy: parseStr(r.privacy) || "private",
      min: parseNum(r.minRate),
      max: parseNum(r.maxRate),
      perNight: parseBool(r.perNight),
      fromPrice: parseBool(r.fromPrice),
      forDuration: parseStr(r.forDuration) || undefined,
      rateTag: parseStr(r.rateTag) || undefined,
    };
    const monthly = parseNum(r.monthly);
    const total = parseNum(r.total);
    if (monthly) room.monthly = monthly;
    if (total) room.total = total;
    roomsByProp[pid].push(room);
  });

  return propsRows.map(p => {
    const id = parseStr(p.id);
    const propRooms = roomsByProp[id] || [];
    const estimates = propRooms.map(r => r.monthly || (r.perNight ? r.min * 30 : r.min)).filter(v => v > 0);
    const minM = estimates.length ? Math.min(...estimates) : 0;
    const maxM = estimates.length ? Math.max(...estimates) : 0;
    const imgs = [parseStr(p.image1_url), parseStr(p.image2_url)].filter(Boolean);

    return {
      id: parseInt(id) || 0,
      name: parseStr(p.name),
      type: parseStr(p.type) || "hotel",
      location: parseStr(p.location),
      distance: parseStr(p.distance),
      distanceMins: parseNum(p.distanceMins),
      proximity: parseNum(p.proximity) || 2,
      contact: {
        email: parseStr(p.email),
        phone: parseStr(p.phone),
        person: parseStr(p.contactPerson),
        website: parseStr(p.website),
      },
      amenities: parseStr(p.amenities).split("|").map(a => a.trim()).filter(Boolean),
      deposit: parseStr(p.deposit),
      rateNote: parseStr(p.rateNote),
      stayType: parseStr(p.stayType) || "both",
      minStay: parseNum(p.minStay),
      maxStay: parseNum(p.maxStay) || 12,
      notes: parseStr(p.notes),
      imgs: imgs.length ? imgs : null,
      rooms: propRooms,
      minMonthly: minM, maxMonthly: maxM,
      rateType: propRooms.some(r => r.monthly || r.total) ? (propRooms.some(r => r.total) ? "total" : "monthly") : (propRooms.some(r => r.perNight) ? "nightly" : "monthly"),
    };
  }).filter(p => p.name && p.rooms.length > 0);
}

function monthlyEstimate(room) {
  if (room.monthly) return room.monthly;
  if (room.perNight) return room.min * 30;
  return room.min;
}

const budgetTiers = ["under_3000", "3000_5000", "5000_8000", "8000_15000", "15000_plus"];
const budgetRanges = { "under_3000": [0,3000], "3000_5000": [3000,5000], "5000_8000": [5000,8000], "8000_15000": [8000,15000], "15000_plus": [15000,999999] };
function isLongDuration(d) { return d === "long_3_6" || d === "long_6_12"; }

function filterAccommodations(accommodations, answers) {
  const { type, duration, budget, proximity, privacy } = answers;
  const [budgetMin, budgetMax] = budgetRanges[budget] || [0, 999999];
  let filtered = accommodations.map(acc => {
    let rooms = acc.rooms;
    if (duration) {
      const wantLong = isLongDuration(duration);
      const dr = rooms.filter(r => !r.forDuration || (wantLong ? r.forDuration === "long" : r.forDuration === "short"));
      if (dr.length > 0) rooms = dr;
    }
    return { ...acc, rooms };
  });
  filtered = filtered.filter(acc => {
    if (type && type !== "any" && acc.type !== type) return false;
    if (!acc.rooms.some(r => { const e = monthlyEstimate(r); return e >= budgetMin && e <= budgetMax; })) return false;
    if (duration === "short" && acc.stayType === "long") return false;
    if (isLongDuration(duration) && acc.stayType === "short" && acc.maxStay < 3) return false;
    const durationMaxMonths = { short:1, medium:3, long_3_6:6, long_6_12:12 };
    if (duration && acc.minStay > (durationMaxMonths[duration] || 12)) return false;
    if (proximity === "walking" && acc.proximity !== 1) return false;
    if (proximity === "commute" && acc.proximity !== 2) return false;
    return true;
  });
  if (privacy === "private") { filtered = filtered.map(a => ({...a, rooms: a.rooms.filter(r => r.privacy === "private")})).filter(a => a.rooms.length > 0); }
  filtered = filtered.map(a => ({...a, rooms: a.rooms.filter(r => { const e = monthlyEstimate(r); return e >= budgetMin && e <= budgetMax; })})).filter(a => a.rooms.length > 0);
  filtered.sort((a,b) => a.minMonthly - b.minMonthly);
  return filtered;
}

function filterWithRelaxation(accommodations, answers) {
  let results = filterAccommodations(accommodations, answers);
  if (results.length > 0) return { results, relaxedMessage: null };
  const suggestions = [];
  if (answers.proximity && answers.proximity !== "any") {
    if (answers.proximity === "walking") {
      let r = filterAccommodations(accommodations, {...answers, proximity:"commute"});
      if (r.length > 0) return { results: r, relaxedMessage: "No walking-distance options matched, showing short commute instead." };
      r = filterAccommodations(accommodations, {...answers, proximity:"any"});
      if (r.length > 0) return { results: r, relaxedMessage: "No nearby options matched, showing all distances instead." };
    } else {
      const r = filterAccommodations(accommodations, {...answers, proximity:"any"});
      if (r.length > 0) return { results: r, relaxedMessage: "No short-commute options matched, showing all distances instead." };
    }
    suggestions.push("try 'Any distance'");
  }
  if (answers.budget) {
    const ci = budgetTiers.indexOf(answers.budget);
    if (ci < budgetTiers.length-1) { const r = filterAccommodations(accommodations, {...answers, budget:budgetTiers[ci+1]}); if (r.length > 0) { const rng = budgetRanges[budgetTiers[ci+1]]; const l = budgetTiers[ci+1]==="15000_plus"?"AED 15,000+":"AED "+rng[0].toLocaleString()+" - "+rng[1].toLocaleString(); return { results:r, relaxedMessage:"No options in your budget. Showing the next tier up ("+l+"/month)." }; } }
    if (ci > 0) { const r = filterAccommodations(accommodations, {...answers, budget:budgetTiers[ci-1]}); if (r.length > 0) { const rng = budgetRanges[budgetTiers[ci-1]]; const l = budgetTiers[ci-1]==="under_3000"?"under AED 3,000":"AED "+rng[0].toLocaleString()+" - "+rng[1].toLocaleString(); return { results:r, relaxedMessage:"No options in your budget. Showing the next tier down ("+l+"/month)." }; } }
    suggestions.push("adjust your budget");
  }
  if (answers.duration) { const r = filterAccommodations(accommodations, {...answers, duration:undefined}); if (r.length > 0) return { results:r, relaxedMessage:"No options matched your stay length. Showing all durations instead." }; suggestions.push("try a different stay length"); }
  if (answers.privacy && answers.privacy !== "any") { const r = filterAccommodations(accommodations, {...answers, privacy:"any"}); if (r.length > 0) return { results:r, relaxedMessage:"No options matched your room preference. Showing all room types." }; suggestions.push("consider shared rooms"); }
  const msg = suggestions.length > 0 ? "No options match this exact combination. You could " + suggestions.join(", or ") + "." : "No options match this combination. Try starting over with different preferences.";
  return { results:[], relaxedMessage: msg };
}

function DualImage({ imgs, alt }) {
  const [failed, setFailed] = useState({});
  const fallback = (<div style={{ width:"100%", height:"180px", background:C.navy, display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontSize:"15px", fontWeight:600, textAlign:"center", padding:"20px" }}>{alt}</div>);
  if (!imgs || imgs.length === 0) return fallback;
  return (
    <div style={{ display:"flex", width:"100%", height:"180px", overflow:"hidden" }}>
      {imgs.map((src, i) => src && !failed[i] ? (
        <img key={i} src={src} alt={alt} style={{ flex:1, objectFit:"cover", minWidth:0 }} onError={() => setFailed(p => ({...p,[i]:true}))} />
      ) : (
        <div key={i} style={{ flex:1, background:C.navy, display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontSize:"13px", fontWeight:600 }}>{alt}</div>
      ))}
    </div>
  );
}

function App() {
  const [accommodations, setAccommodations] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [results, setResults] = useState([]);
  const [relaxedMessage, setRelaxedMessage] = useState(null);
  const [expandedContact, setExpandedContact] = useState(null);
  const [expandedAmenities, setExpandedAmenities] = useState(null);
  const [sortBy, setSortBy] = useState("price");

  useEffect(() => {
    function onData() {
      if (window._sheetLoadError) {
        setError("Could not load accommodation data. Please try refreshing the page.");
        setLoading(false);
        return;
      }
      if (window._rawSheetData) {
        try {
          const data = buildData(window._rawSheetData.props, window._rawSheetData.rooms);
          if (data.length === 0) throw new Error("empty");
          setAccommodations(data);
        } catch(e) {
          setError("Could not load accommodation data. Please try refreshing the page.");
        }
        setLoading(false);
      }
    }
    if (window._rawSheetData) { onData(); }
    else { window.addEventListener('sheetDataReady', onData); }
    return () => window.removeEventListener('sheetDataReady', onData);
  }, []);

  const runFilter = (a) => { const { results:r, relaxedMessage:msg } = filterWithRelaxation(accommodations, a); setResults(r); setRelaxedMessage(msg); setStep(6); };
  const selectAnswer = (key, value) => {
    const na = {...answers, [key]:value}; setAnswers(na);
    if (key === "type" && value === "any") { setResults(accommodations); setRelaxedMessage(null); setStep(6); return; }
    const ns = step + 1;
    if (ns === 5 && na.type !== "student_residence") { runFilter({...na, privacy:"any"}); return; }
    if (ns === 6) runFilter(na); else setStep(ns);
  };
  const goBack = () => {
    if (step===2){const na={...answers};delete na.type;setAnswers(na);setStep(1);}
    else if(step===3){const na={...answers};delete na.duration;setAnswers(na);setStep(2);}
    else if(step===4){const na={...answers};delete na.budget;setAnswers(na);setStep(3);}
    else if(step===5){const na={...answers};delete na.proximity;setAnswers(na);setStep(4);}
  };
  const reset = () => { setStep(0); setAnswers({}); setResults([]); setRelaxedMessage(null); setExpandedContact(null); setExpandedAmenities(null); setSortBy("price"); };

  const s = {
    container: { fontFamily:"'Plus Jakarta Sans','Segoe UI',sans-serif", background:C.cream, minHeight:"100vh", color:C.navy },
    header: { background:C.navy, padding:"18px 24px", color:"white", display:"flex", alignItems:"center", justifyContent:"space-between" },
    content: { maxWidth:"680px", margin:"0 auto", padding:"24px 16px" },
    q: { fontSize:"22px", fontWeight:700, marginBottom:"8px", color:C.navy, lineHeight:1.3 },
    sub: { fontSize:"14px", color:C.gray, marginBottom:"24px", lineHeight:1.5 },
  };
  const optStyle = { background:"white", color:C.navy, border:"2px solid "+C.lightGray, borderRadius:"10px", padding:"16px 20px", marginBottom:"10px", cursor:"pointer", display:"flex", flexDirection:"column", gap:"3px", transition:"border-color 0.15s ease" };
  const renderOption = (opt, onClick) => (
    <div key={opt.value} style={optStyle} onClick={() => onClick(opt.value)} onMouseOver={e => e.currentTarget.style.borderColor=C.navy} onMouseOut={e => e.currentTarget.style.borderColor=C.lightGray}>
      <span style={{ fontSize:"15px", fontWeight:600 }}>{opt.label}</span><span style={{ fontSize:"13px", color:C.gray }}>{opt.desc}</span>
    </div>
  );

  if (loading) return null;
  if (error) return (<div style={{...s.container, display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"40px"}}><div><h2 style={{marginBottom:"12px", fontSize:"18px"}}>{error}</h2><button onClick={() => window.location.reload()} style={{background:C.navy,color:"white",border:"none",borderRadius:"8px",padding:"12px 32px",fontSize:"14px",fontWeight:700,cursor:"pointer"}}>Retry</button></div></div>);

  if (step === 0) return (
    <div style={{ background:C.navy, minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 24px", textAlign:"center", color:"white" }}>
      <div style={{ fontSize:"12px", letterSpacing:"3px", textTransform:"uppercase", marginBottom:"20px", opacity:0.6, fontWeight:500 }}>Hult International Business School</div>
      <h1 style={{ fontSize:"34px", fontWeight:800, marginBottom:"14px", lineHeight:1.2 }}>Dubai Home Finder</h1>
      <p style={{ fontSize:"15px", maxWidth:"420px", opacity:0.7, lineHeight:1.7, marginBottom:"40px" }}>Answer a few questions and we'll match you with accommodation options from Hult's partner network that fit your needs and budget.</p>
      <button onClick={() => setStep(1)} style={{ background:"white", color:C.navy, border:"none", borderRadius:"8px", padding:"16px 48px", fontSize:"15px", fontWeight:700, cursor:"pointer" }}>Find Your Home</button>
      <div style={{ marginTop:"48px", fontSize:"11px", opacity:0.35 }}>Hult Dubai Accommodation AY 2025-2026</div>
    </div>
  );

  if (step >= 1 && step <= 5) {
    const totalSteps = answers.type === "student_residence" ? 5 : 4;
    const pp = (step / totalSteps) * 100;
    const typeOpts = [{value:"student_residence",label:"Student Residence",desc:"Purpose-built student housing with shuttle service"},{value:"hotel",label:"Hotel / Hotel Apartment",desc:"Short or long-term stays, serviced apartments, many near campus"},{value:"any",label:"Show me everything",desc:"Compare all types of accommodation"}];
    const durOpts = [{value:"short",label:"Short-term (under 1 month)",desc:"Nightly rates, ideal for your first weeks in Dubai"},{value:"medium",label:"1 - 3 months",desc:"Settling in while you explore longer options"},{value:"long_3_6",label:"3 - 6 months",desc:"One semester or half the academic year"},{value:"long_6_12",label:"6 - 12 months",desc:"Full academic year or longer"}];
    const budOpts = [{value:"under_3000",label:"Under AED 3,000 / month",desc:"Most affordable, shared rooms available"},{value:"3000_5000",label:"AED 3,000 - 5,000 / month",desc:"Private rooms and basic studios"},{value:"5000_8000",label:"AED 5,000 - 8,000 / month",desc:"Mid-range studios and apartments"},{value:"8000_15000",label:"AED 8,000 - 15,000 / month",desc:"Premium hotels and apartments"},{value:"15000_plus",label:"AED 15,000+ / month",desc:"Luxury beachfront and large apartments"}];
    const proxOpts = [{value:"walking",label:"Walking distance only",desc:"Under 20 min walk to campus"},{value:"commute",label:"Short commute",desc:"10 - 30 min by car or shuttle"},{value:"any",label:"Any distance",desc:"Show everything, near and far"}];
    const privOpts = [{value:"private",label:"Private room / Studio",desc:"My own space, higher price point"},{value:"shared",label:"Shared room is fine",desc:"Happy to share to save money"},{value:"any",label:"Show me both",desc:"Compare all options"}];
    return (
      <div style={s.container}>
        <div style={s.header}><span style={{fontWeight:700,fontSize:"15px"}}>Dubai Home Finder</span><button onClick={reset} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"white",borderRadius:"6px",padding:"6px 14px",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>Start Over</button></div>
        <div style={{height:"3px",background:C.lightGray}}><div style={{height:"3px",background:C.blue,width:`${pp}%`,transition:"width 0.3s ease"}}/></div>
        <div style={s.content}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}><div style={{fontSize:"12px",color:C.gray,fontWeight:500}}>Step {step} of {totalSteps}</div>{step>1&&<button onClick={goBack} style={{background:"none",border:"none",color:C.blue,fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:"4px 0"}}><span style={{marginRight:"4px"}}>&larr;</span> Back</button>}</div>
          {step===1&&(<><div style={s.q}>What type of accommodation are you looking for?</div><div style={s.sub}>This helps us narrow down the right options.</div>{typeOpts.map(o=>renderOption(o,v=>selectAnswer("type",v)))}</>)}
          {step===2&&(<><div style={s.q}>How long do you need accommodation for?</div><div style={s.sub}>This affects which options and rates are available.</div>{durOpts.map(o=>renderOption(o,v=>selectAnswer("duration",v)))}</>)}
          {step===3&&(<><div style={s.q}>What's your monthly budget? (AED)</div><div style={s.sub}>We'll show options with rooms that fit your range.</div>{budOpts.map(o=>renderOption(o,v=>selectAnswer("budget",v)))}</>)}
          {step===4&&(<><div style={s.q}>How important is being close to campus?</div><div style={s.sub}>Hult's campus is in Dubai Internet City.</div>{proxOpts.map(o=>renderOption(o,v=>selectAnswer("proximity",v)))}</>)}
          {step===5&&answers.type==="student_residence"&&(<><div style={s.q}>Private room or okay sharing?</div><div style={s.sub}>Shared rooms are significantly cheaper.</div>{privOpts.map(o=>renderOption(o,v=>{const fa={...answers,privacy:v};setAnswers(fa);runFilter(fa);}))}</>)}
        </div>
      </div>
    );
  }

  if (step===6) return (
    <div style={s.container}>
      <div style={s.header}><span style={{fontWeight:700,fontSize:"15px"}}>Dubai Home Finder</span><button onClick={reset} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"white",borderRadius:"6px",padding:"6px 14px",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>Start Over</button></div>
      <div style={s.content}>
        <div style={s.q}>{results.length>0?`We found ${results.length} option${results.length!==1?"s":""} for you`:"No exact matches"}</div>
        <div style={s.sub}>{results.length>0?"Use your Hult student email for partner rates.":"Try adjusting your filters below."}</div>
        {relaxedMessage&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:"8px",padding:"12px 16px",marginBottom:"20px",fontSize:"13px",color:"#1E40AF",lineHeight:1.5}}>{relaxedMessage}</div>}
        <div style={{background:"white",borderRadius:"10px",padding:"12px 16px",marginBottom:"24px",display:"flex",flexWrap:"wrap",gap:"8px",border:"1px solid "+C.lightGray}}>
          {answers.type&&<span style={{background:C.tagBg,color:C.navy,padding:"4px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:600}}>{answers.type==="any"?"All Types":typeLabels[answers.type]}</span>}
          {answers.duration&&<span style={{background:C.tagBg,color:C.navy,padding:"4px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:600}}>{answers.duration==="short"?"< 1 month":answers.duration==="medium"?"1-3 months":answers.duration==="long_3_6"?"3-6 months":"6-12 months"}</span>}
          {answers.budget&&<span style={{background:C.tagBg,color:C.navy,padding:"4px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:600}}>{answers.budget==="under_3000"?"< AED 3K":answers.budget==="3000_5000"?"AED 3-5K":answers.budget==="5000_8000"?"AED 5-8K":answers.budget==="8000_15000"?"AED 8-15K":"AED 15K+"}</span>}
          {answers.proximity&&<span style={{background:C.tagBg,color:C.navy,padding:"4px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:600}}>{answers.proximity==="walking"?"Walking distance":answers.proximity==="commute"?"Short commute":"Any distance"}</span>}
        </div>
